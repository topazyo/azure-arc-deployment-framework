[flake8]
# Modern Python projects use 120 char line length
max-line-length = 120

# Ignore specific warnings that conflict with modern practices
ignore =
    # W503: line break before binary operator (PEP 8 now prefers this)
    W503,
    # W504: line break after binary operator (acceptable in some contexts)
    W504,
    # E203: whitespace before ':' (conflicts with black formatter)
    E203,
    # E122-E131: continuation line indentation (autopep8 formatting artifacts)
    E122,
    E123,
    E125,
    E128,
    E131

# Per-file ignores for specific modules
per-file-ignores =
    # Test files can have longer lines for assertions
    tests/*: E501
    # __init__.py files may have unused imports for re-export
    */__init__.py: F401

# Exclude directories
exclude =
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info,
    .venv,
    venv,
    .eggs

# McCabe complexity threshold
max-complexity = 15

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = src/Python
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
