name: CI

on:
  push:
    branches: [main, develop, "audit/**"]
  pull_request:
    branches: [main, develop]

jobs:
  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flake8 lint
        run: python -m flake8 src/Python

      - name: Run pytest
        run: python -m pytest tests/Python --junitxml=test-results-python.xml

      - name: Upload Python test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-results
          path: test-results-python.xml

  powershell-lint-test:
    name: PowerShell Lint & Test
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/PowerShell -Recurse -Severity Error
          if ($results) {
            $results | Format-List
            Write-Error "PSScriptAnalyzer found $($results.Count) Error-severity finding(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no Error-severity findings."

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -Path ./tests/PowerShell -CI -OutputFormat NUnitXml -OutputFile test-results-ps.xml

      - name: Upload PowerShell test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: powershell-test-results
          path: test-results-ps.xml
